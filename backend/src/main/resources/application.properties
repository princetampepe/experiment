server.port=8080
spring.application.name=pulse-backend

# Embedded file-based H2 database for offline usage.
spring.datasource.url=jdbc:h2:file:./data/pulsedb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.jwt.secret=change-me-dev-secret-that-is-at-least-32-characters
app.jwt.expiration-minutes=720
app.jwt.refresh-expiration-minutes=20160
app.cors.allowed-origin=http://localhost:5173

app.rate-limit.posts-per-minute=8
app.rate-limit.comments-per-minute=20
app.rate-limit.follows-per-minute=25
app.rate-limit.engagements-per-minute=80
app.rate-limit.edits-per-minute=12
app.rate-limit.messages-per-minute=35

app.moderation.blocked-terms=scam,phishing,malware
