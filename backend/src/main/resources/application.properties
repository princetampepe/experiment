server.port=8080
spring.application.name=pulse-backend

# Embedded file-based H2 database for offline usage.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/pulsedb;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.h2.console.enabled=${SPRING_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=${SPRING_H2_CONSOLE_PATH:/h2-console}

app.jwt.secret=${APP_JWT_SECRET:change-me-dev-secret-that-is-at-least-32-characters}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:720}
app.jwt.refresh-expiration-minutes=${APP_JWT_REFRESH_EXPIRATION_MINUTES:20160}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

app.rate-limit.posts-per-minute=8
app.rate-limit.comments-per-minute=20
app.rate-limit.follows-per-minute=25
app.rate-limit.engagements-per-minute=80
app.rate-limit.edits-per-minute=12
app.rate-limit.messages-per-minute=35

app.moderation.blocked-terms=scam,phishing,malware
